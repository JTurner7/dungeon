apiVersion: v1
kind: Service
metadata:
  labels:
    app: grafana
  name: grafana-loadbalancer
spec:
  ports:
  - name: http-web
    port: 3000
    protocol: TCP
    targetPort: grafana
  selector:
    app.kubernetes.io/instance: prometheus-stack
    app.kubernetes.io/name: grafana
  type: LoadBalancer
status:
  loadBalancer: {}
